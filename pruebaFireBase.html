<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Seguimiento Yar-Yur</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #212121;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #888;
        }
        
        /* Contenedor de Login */
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        
        /* Contenedor Principal de la App */
        #app-container {
            display: none; /* Oculto hasta iniciar sesión */
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f5f5f5; /* Fondo claro para la tabla */
            color: #333;
        }

        /* Barra superior de info de usuario */
        #header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin-bottom: 20px;
        }

        #usuario-info { font-size: 16px; font-weight: bold; color: #333; }
        #estado { font-size: 14px; font-weight: bold; }
        
        /* Estilos de botones */
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #btn-login {
            background-color: white;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        #btn-login:hover { background-color: #eee; }
        #btn-logout {
            background-color: #d32f2f;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }
        #btn-logout:hover { background-color: #b71c1c; }

        /* ESTILOS DE LA TABLA */
        #tabla-contenedor {
            width: 100%;
            max-width: 1400px;
            overflow-x: auto;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 5px;
            text-align: center;
            vertical-align: top; /* Alinea los inputs hacia arriba */
        }

        th {
            background-color: #fff;
            color: black;
            font-size: 18px;
            padding: 15px;
        }

        /* Columna de nombres a la izquierda */
        .columna-nombre {
            background-color: black;
            color: white;
            font-weight: bold;
            font-size: 16px;
            vertical-align: middle;
            width: 10%;
        }

        /* Inputs de la cuadrícula */
        .input-proyecto {
            width: 100%;
            padding: 6px;
            margin-bottom: 4px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
            background-color: #fff;
            color: #000;
        }

        .input-proyecto:focus {
            outline: 2px solid #2196F3;
            border-color: #2196F3;
        }
        
        /* Ocultar el último margen del input de cada celda */
        .input-proyecto:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: white; margin-bottom: 5px;">Seguimiento Proyectos Yar-Yur</h2>
        <p>Inicia sesión para acceder al tablero</p>
        <button id="btn-login">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Acceder con Google
        </button>
    </div>

    <div id="app-container">
        <div id="header-app">
            <div id="usuario-info">Conectado como: <span id="nombre-usuario" style="color: #1976D2;"></span></div>
            <div id="estado" style="color: #f57c00;">Sincronizando...</div>
            <button id="btn-logout">Cerrar sesión</button>
        </div>
        
        <div id="tabla-contenedor"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // Tus credenciales intactas
        const firebaseConfig = {
            apiKey: "AIzaSyAPRAy9kHU8gxt3SYYXKuG9xGNtlbI18HQ",
            authDomain: "seguimiento-proyectos-yar-yur.firebaseapp.com",
            databaseURL: "https://seguimiento-proyectos-yar-yur-default-rtdb.firebaseio.com",
            projectId: "seguimiento-proyectos-yar-yur",
            storageBucket: "seguimiento-proyectos-yar-yur.firebasestorage.app",
            messagingSenderId: "952890737656",
            appId: "1:952890737656:web:486c9a7d2c9ed13060cc0d",
            measurementId: "G-XMNDL0V5KQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // Referencia principal donde se guardará todo el tablero
        const tableroRef = ref(db, 'tableroProyectos');

        const loginContainer = document.getElementById('login-container');
        const appContainer = document.getElementById('app-container');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const nombreUsuarioSpan = document.getElementById('nombre-usuario');
        const estado = document.getElementById('estado');
        const tablaContenedor = document.getElementById('tabla-contenedor');

        // DATOS PARA GENERAR LA TABLA
        const dias = ['lunes 18/05', 'martes 19/05', 'miércoles 20/05', 'jueves 21/05', 'viernes 22/05'];
        const personas = ['GUILLE', 'DAVID', 'YARELLY', 'EIDER', 'ANDREA', 'ANGEL', 'CARELIS', 'VIRLEY'];
        const numCamposPorCelda = 4;

        // FUNCIÓN PARA CREAR LA TABLA DINÁMICAMENTE
        function generarTabla() {
            let html = '<table>';
            
            // Fila de encabezados (Días)
            html += '<tr><th></th>'; // Espacio vacío arriba de los nombres
            dias.forEach(dia => {
                html += `<th>${dia}</th>`;
            });
            html += '</tr>';

            // Filas de personas
            personas.forEach(persona => {
                html += '<tr>';
                html += `<td class="columna-nombre">${persona}</td>`;
                
                // Celdas de los días
                dias.forEach(dia => {
                    html += `<td>`;
                    // Crear 4 inputs por cada celda
                    for (let i = 0; i < numCamposPorCelda; i++) {
                        // Creamos un ID único, ej: DAVID-lunes 18/05-2
                        const idUnico = `${persona}-${dia}-${i}`.replace(/\s|\//g, '-'); // Reemplaza espacios y barras para evitar errores
                        html += `<input type="text" id="${idUnico}" class="input-proyecto">`;
                    }
                    html += `</td>`;
                });
                
                html += '</tr>';
            });
            
            html += '</table>';
            tablaContenedor.innerHTML = html;
        }

        // ACCIONES DE SESIÓN
        btnLogin.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error(error));
        });

        btnLogout.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.style.display = 'none';
                appContainer.style.display = 'flex';
                document.body.style.backgroundColor = '#f5f5f5'; // Cambia fondo general
                nombreUsuarioSpan.innerText = user.displayName;
                
                // 1. Generamos la tabla en la interfaz
                generarTabla();
                // 2. Iniciamos la sincronización con Firebase
                iniciarSincronizacion();
            } else {
                loginContainer.style.display = 'flex';
                appContainer.style.display = 'none';
                document.body.style.backgroundColor = '#212121';
            }
        });

        // LÓGICA DE SINCRONIZACIÓN (160 CAMPOS)
        function iniciarSincronizacion() {
            const todosLosInputs = document.querySelectorAll('.input-proyecto');

            // CUANDO TÚ ESCRIBES EN CUALQUIER CAMPO
            todosLosInputs.forEach(input => {
                input.addEventListener('input', (e) => {
                    // Guardamos específicamente en el ID de ese input dentro de 'tableroProyectos'
                    set(ref(db, `tableroProyectos/${e.target.id}`), e.target.value);
                });
            });

            // CUANDO ALGUIEN MÁS ESCRIBE (O AL ENTRAR A LA PÁGINA)
            onValue(tableroRef, (snapshot) => {
                estado.innerText = "Conectado en tiempo real 🟢";
                estado.style.color = "#4CAF50";
                
                const datosTablero = snapshot.val() || {};

                todosLosInputs.forEach(input => {
                    const textoServidor = datosTablero[input.id] || "";
                    
                    // Solo actualizamos el input si el texto es distinto al servidor 
                    // Y si el usuario NO está escribiendo en él en este momento (evita saltos del cursor)
                    if (input.value !== textoServidor && document.activeElement !== input) {
                        input.value = textoServidor;
                    }
                });
            }, (error) => {
                console.error("Error:", error);
                estado.innerText = "Error de conexión 🔴";
                estado.style.color = "#d32f2f";
            });
        }
    </script>
</body>
</html>
