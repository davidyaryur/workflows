<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Seguimiento Yar-Yur</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; background-color: #212121; font-family: 'Segoe UI', sans-serif; color: #888; }
        
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        #app-container { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; background-color: #f5f5f5; color: #333; }
        #header-app { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1400px; margin-bottom: 20px; }
        #usuario-info { font-size: 16px; font-weight: bold; color: #333; }
        #estado { font-size: 14px; font-weight: bold; }
        
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        #btn-login { background-color: white; color: #444; display: flex; align-items: center; gap: 10px; margin-top: 20px; }
        #btn-logout { background-color: #d32f2f; color: white; padding: 8px 15px; font-size: 14px; }

        #tabla-contenedor { width: 100%; max-width: 1400px; overflow-x: auto; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; vertical-align: top; }
        th { background-color: #fff; color: black; font-size: 18px; padding: 15px; }
        .columna-nombre { background-color: black; color: white; font-weight: bold; font-size: 16px; vertical-align: middle; width: 10%; }

        .celda-inputs { display: flex; flex-direction: column; gap: 4px; }

        /* Contenedor Minimalista */
        .slot-wrapper {
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #ffffff;
            transition: background-color 0.3s ease;
            overflow: hidden;
        }

        /* Ocultar flechas de selectores */
        .select-fase, .select-status {
            border: none;
            background: transparent;
            font-size: 11px;
            padding: 4px;
            outline: none;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
        }

        .input-proyecto {
            border: none;
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            font-size: 12px;
            font-weight: bold;
            background-color: transparent;
            color: #000;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: white; margin-bottom: 5px;">Seguimiento Proyectos Yar-Yur</h2>
        <button id="btn-login">Acceder con Google</button>
    </div>

    <div id="app-container">
        <div id="header-app">
            <div id="usuario-info">Conectado como: <span id="nombre-usuario"></span></div>
            <div id="estado">Cargando...</div>
            <button id="btn-logout">Cerrar sesión</button>
        </div>
        <datalist id="lista-proyectos"></datalist>
        <div id="tabla-contenedor"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPRAy9kHU8gxt3SYYXKuG9xGNtlbI18HQ",
            authDomain: "seguimiento-proyectos-yar-yur.firebaseapp.com",
            databaseURL: "https://seguimiento-proyectos-yar-yur-default-rtdb.firebaseio.com",
            projectId: "seguimiento-proyectos-yar-yur",
            storageBucket: "seguimiento-proyectos-yar-yur.firebasestorage.app",
            messagingSenderId: "952890737656",
            appId: "1:952890737656:web:486c9a7d2c9ed13060cc0d",
            measurementId: "G-XMNDL0V5KQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tableroRef = ref(db, 'tableroProyectos');

        const loginContainer = document.getElementById('login-container');
        const appContainer = document.getElementById('app-container');
        const tablaContenedor = document.getElementById('tabla-contenedor');

        const dias = ['lunes 18/05', 'martes 19/05', 'miércoles 20/05', 'jueves 21/05', 'viernes 22/05'];
        const personas = ['GUILLE', 'DAVID', 'YARELLY', 'EIDER', 'ANDREA', 'ANGEL', 'CARELIS', 'VIRLEY'];
        const maxCamposPorCelda = 10; 

        function generarTabla() {
            let html = '<table><tr><th></th>';
            dias.forEach(dia => html += `<th>${dia}</th>`); html += '</tr>';

            personas.forEach(persona => {
                html += `<tr><td class="columna-nombre">${persona}</td>`;
                dias.forEach(dia => {
                    html += `<td><div class="celda-inputs" id="celda-${persona}-${dia.replace(/\s|\//g, '-')}">`;
                    for (let i = 0; i < maxCamposPorCelda; i++) {
                        const idUnico = `${persona}-${dia}-${i}`.replace(/\s|\//g, '-');
                        html += `
                        <div class="slot-wrapper" id="wrapper-${idUnico}" style="display: ${i === 0 ? 'flex' : 'none'};">
                            <div style="display:flex;">
                                <select class="select-fase" id="fase-${idUnico}"><option value="">Fase</option><option value="RENDIMIENTO">RENDIMIENTO</option><option value="VISUAL">VISUAL</option><option value="PLANO">PLANO</option><option value="MUESTRA">MUESTRA</option><option value="PRODUCCIÓN">PRODUCCIÓN</option></select>
                                <select class="select-status" id="status-${idUnico}" style="display:none;"><option value="">Status</option><option value="EN PROCESO">EN PROCESO</option><option value="COMPROMISO">COMPROMISO</option><option value="ENTREGADO">ENTREGADO</option><option value="EN ESPERA">EN ESPERA</option></select>
                            </div>
                            <input type="text" id="${idUnico}" class="input-proyecto" list="lista-proyectos" placeholder="Proyecto..." style="display:none;">
                        </div>`;
                    }
                    html += `</div></td>`;
                });
                html += '</tr>';
            });
            tablaContenedor.innerHTML = html;
        }

        function aplicarColores(wrapperId, fase, status) {
            const el = document.getElementById(wrapperId);
            const statusInput = el.querySelector('.select-status');
            const inputTxt = el.querySelector('.input-proyecto');
            
            if (status === 'ENTREGADO') {
                el.style.backgroundColor = (fase === 'MUESTRA' || fase === 'PRODUCCIÓN') ? '#28a745' : '#c8e6c9';
                el.style.color = '#fff';
            } else if (status === 'EN ESPERA') {
                el.style.backgroundColor = '#fce4ec';
                el.style.color = 'red'; /* Texto rojo para EN ESPERA */
            } else if (status === 'EN PROCESO') {
                el.style.backgroundColor = '#fff3e0'; /* Naranja pastel */
                el.style.color = '#e65100';
            } else {
                el.style.backgroundColor = '#ffffff';
                el.style.color = '#333';
            }
        }

        function actualizarVisibilidad(wrapperId) {
            const wrapper = document.getElementById(wrapperId);
            const fase = wrapper.querySelector('.select-fase');
            const status = wrapper.querySelector('.select-status');
            const input = wrapper.querySelector('.input-proyecto');
            
            status.style.display = fase.value ? 'block' : 'none';
            input.style.display = (fase.value && status.value) ? 'block' : 'none';
            
            // Expandir celda
            const celda = wrapper.closest('.celda-inputs');
            Array.from(celda.querySelectorAll('.slot-wrapper')).forEach((w, i) => {
                const f = w.querySelector('.select-fase').value;
                w.style.display = (i === 0 || f !== "") ? 'flex' : 'none';
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.style.display = 'none'; appContainer.style.display = 'flex';
                generarTabla(); iniciarSincronizacion();
            }
        });

        function iniciarSincronizacion() {
            document.querySelectorAll('.select-fase, .select-status, .input-proyecto').forEach(el => {
                el.addEventListener('change', (e) => {
                    const idBase = e.target.id.split('-').slice(1).join('-');
                    set(ref(db, `tableroProyectos/${idBase}`), {
                        texto: document.getElementById(idBase).value,
                        fase: document.getElementById(`fase-${idBase}`).value,
                        status: document.getElementById(`status-${idBase}`).value
                    });
                    actualizarVisibilidad(`wrapper-${idBase}`);
                    aplicarColores(`wrapper-${idBase}`, document.getElementById(`fase-${idBase}`).value, document.getElementById(`status-${idBase}`).value);
                });
            });

            onValue(tableroRef, (snapshot) => {
                const data = snapshot.val() || {};
                Object.keys(data).forEach(id => {
                    if (document.getElementById(id)) {
                        document.getElementById(id).value = data[id].texto || "";
                        document.getElementById(`fase-${id}`).value = data[id].fase || "";
                        document.getElementById(`status-${id}`).value = data[id].status || "";
                        actualizarVisibilidad(`wrapper-${id}`);
                        aplicarColores(`wrapper-${id}`, data[id].fase, data[id].status);
                    }
                });
            });
        }
    </script>
</body>
</html>
