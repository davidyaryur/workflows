<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Seguimiento Yar-Yur</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #212121;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #888;
        }
        
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        
        #app-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f5f5f5;
            color: #333;
        }

        /* ENCABEZADO OCULTO POR DEFECTO */
        #header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            max-height: 0; /* Oculto */
            overflow: hidden;
            margin-bottom: 0;
            transition: max-height 0.4s ease, margin-bottom 0.4s ease;
        }
        
        #header-app.open {
            max-height: 80px;
            margin-bottom: 20px;
        }

        #usuario-info { font-size: 16px; font-weight: bold; color: #333; }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #btn-login { background-color: white; color: #444; display: flex; align-items: center; gap: 10px; margin-top: 20px; }
        #btn-login:hover { background-color: #eee; }
        #btn-logout { background-color: #d32f2f; color: white; padding: 8px 15px; font-size: 14px; }
        #btn-logout:hover { background-color: #b71c1c; }

        /* ESTILOS DE LA TABLA */
        #tabla-contenedor {
            width: 100%;
            max-width: 1400px;
            overflow-x: auto;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.4s ease;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; vertical-align: top; }
        th { background-color: #fff; color: black; font-size: 18px; padding: 15px; }

        .columna-nombre {
            background-color: black;
            color: white;
            font-weight: bold;
            font-size: 16px;
            vertical-align: middle;
            width: 10%;
        }

        .celda-inputs { display: flex; flex-direction: column; gap: 6px; }

        /* ESTILOS DEL CONTENEDOR TRIPLE - Minimalista */
        .slot-wrapper {
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            background-color: #ffffff;
            transition: background-color 0.3s ease;
        }
        
        .slot-wrapper:focus-within {
            outline: 2px solid #2196F3;
            border-color: #2196F3;
        }

        .slot-header {
            display: flex;
            justify-content: space-between;
        }

        /* Limpiamos estilos nativos de los selects para dejarlos en blanco */
        .select-fase, .select-status {
            border: none;
            background: transparent;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            font-size: 10px;
            padding: 4px 6px;
            outline: none;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s ease;
        }
        
        /* Regla para evitar que los menús se vuelvan invisibles al cambiar texto a blanco */
        option { color: black; background: white; }

        .select-fase { text-align: left; }
        .select-status { text-align: right; }

        .input-proyecto {
            border: none;
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            font-size: 12px;
            font-weight: bold;
            background-color: transparent; /* Transparente para que herede el fondo */
            color: #000;
            outline: none;
        }
        
        .input-proyecto::placeholder { color: #888; font-weight: normal; }

        /* Botón hamburguesa */
        #menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
            padding: 0;
            line-height: 1;
            border-radius: 0;
        }
        #menu-toggle:hover { color: #1976D2; }

    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: white; margin-bottom: 5px;">Seguimiento Proyectos Yar-Yur</h2>
        <p>Inicia sesión para acceder al tablero</p>
        <button id="btn-login">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Acceder con Google
        </button>
    </div>

    <div id="app-container">
        <div id="header-app">
            <div id="usuario-info">Conectado como: <span id="nombre-usuario" style="color: #1976D2;"></span></div>
            <button id="btn-logout">Cerrar sesión</button>
        </div>
        
        <!-- Datalist global -->
        <datalist id="lista-proyectos"></datalist>

        <div id="tabla-contenedor"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPRAy9kHU8gxt3SYYXKuG9xGNtlbI18HQ",
            authDomain: "seguimiento-proyectos-yar-yur.firebaseapp.com",
            databaseURL: "https://seguimiento-proyectos-yar-yur-default-rtdb.firebaseio.com",
            projectId: "seguimiento-proyectos-yar-yur",
            storageBucket: "seguimiento-proyectos-yar-yur.firebasestorage.app",
            messagingSenderId: "952890737656",
            appId: "1:952890737656:web:486c9a7d2c9ed13060cc0d",
            measurementId: "G-XMNDL0V5KQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tableroRef = ref(db, 'tableroProyectos');

        const loginContainer = document.getElementById('login-container');
        const appContainer = document.getElementById('app-container');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const nombreUsuarioSpan = document.getElementById('nombre-usuario');
        const tablaContenedor = document.getElementById('tabla-contenedor');

        const dias = ['lunes 18/05', 'martes 19/05', 'miércoles 20/05', 'jueves 21/05', 'viernes 22/05'];
        const personas = ['GUILLE', 'DAVID', 'YARELLY', 'EIDER', 'ANDREA', 'ANGEL', 'CARELIS', 'VIRLEY'];
        const maxCamposPorCelda = 10; 

        let projectDatabase = [];
        let listaCompletaProyectos = [];

        function normalizeTrelloData(rawData) { 
            let data = { ...rawData }; 
            if (!data.lists) data.lists = []; 
            if (!data.labels || !Array.isArray(data.labels)) data.labels = []; 
            if (!data.cards) data.cards = []; 
            return data; 
        }

        function processHistoryData(dailyDataArray) {
            let tempMap = {}; 
            dailyDataArray.forEach(dayRecord => {
                const date = dayRecord.fecha; 
                const trelloData = normalizeTrelloData(dayRecord.data);
                let listsMap = {}; 
                let labelsMap = {};
                if(trelloData.lists) trelloData.lists.forEach(l => { if (!l.closed) listsMap[l.id] = l.name; });
                if(trelloData.labels) trelloData.labels.forEach(l => labelsMap[l.id] = l.name || ("Color " + l.color));
                
                let sortedCards = []; 
                if(trelloData.cards) sortedCards = trelloData.cards.filter(c => !c.closed).sort((a, b) => a.pos - b.pos);
                
                let cardsByList = {}; 
                sortedCards.forEach(c => { 
                    const ln = listsMap[c.idList] || "Desconocido"; 
                    if (!cardsByList[ln]) cardsByList[ln] = []; 
                    cardsByList[ln].push(c); 
                });

                Object.keys(cardsByList).forEach(listName => {
                    cardsByList[listName].forEach(card => {
                        const match = card.name.match(/^(\d+)\s*\/\s*(\d+)\s*-\s*(.*?)\s*-\s*(.*)/);
                        let base = match ? { code: String(parseInt(match[1], 10)).padStart(3, '0'), year: match[2], client: match[3].trim(), desc: match[4].trim() } : { code: "N/A", year: "-", client: "Varios / Otro", desc: card.name };
                        
                        const cardId = card.id; 
                        if (!tempMap[cardId]) tempMap[cardId] = { metadata: base, history: [] }; 
                        tempMap[cardId].metadata = base;
                        tempMap[cardId].history.push({ date: date, listName: listName });
                    });
                });
            });

            projectDatabase = [];
            Object.keys(tempMap).forEach(id => {
                const item = tempMap[id]; 
                const latest = item.history[item.history.length - 1]; 
                if (item.metadata.year !== '-' && item.metadata.code !== 'N/A') { 
                    projectDatabase.push({ id: id, ...item.metadata, listName: latest.listName }); 
                }
            });
        }

        async function cargarProyectosDesdeJSON() {
            try {
                const res = await fetch('history_all.json');
                const rawHistoryData = await res.json();
                
                if (rawHistoryData && rawHistoryData.length > 0) {
                    processHistoryData(rawHistoryData);
                    const mapaProyectos = new Map();

                    projectDatabase.forEach(p => {
                        const claveProyecto = `${p.code}/${p.year}`;
                        const textoFinal = `${claveProyecto} - ${p.client} - ${p.desc}`;
                        
                        if (mapaProyectos.has(claveProyecto)) {
                            const textoExistente = mapaProyectos.get(claveProyecto);
                            if (textoFinal.length < textoExistente.length) {
                                mapaProyectos.set(claveProyecto, textoFinal);
                            }
                        } else {
                            mapaProyectos.set(claveProyecto, textoFinal);
                        }
                    });

                    const listaOrdenada = Array.from(mapaProyectos.values()).sort((a, b) => {
                        const prefijoA = a.split('-')[0].trim();
                        const prefijoB = b.split('-')[0].trim();
                        
                        const [codigoA, anioA] = prefijoA.split('/');
                        const [codigoB, anioB] = prefijoB.split('/');

                        const numAnioA = parseInt(anioA, 10) || 0;
                        const numAnioB = parseInt(anioB, 10) || 0;
                        const numCodigoA = parseInt(codigoA, 10) || 0;
                        const numCodigoB = parseInt(codigoB, 10) || 0;

                        if (numAnioA !== numAnioB) return numAnioA - numAnioB;
                        return numCodigoA - numCodigoB;
                    });

                    listaCompletaProyectos = listaOrdenada;
                    actualizarDatalist("");
                }
            } catch (error) {
                console.error("Error al procesar JSON:", error);
            }
        }

        function actualizarDatalist(filtro) {
            const datalist = document.getElementById('lista-proyectos');
            datalist.innerHTML = '';
            
            const terms = filtro.toLowerCase().split(' ').filter(t => t.trim() !== '');

            const filtrados = listaCompletaProyectos.filter(texto => {
                const textoLower = texto.toLowerCase();
                return terms.every(term => textoLower.includes(term));
            });

            const limit = 50; 
            for (let i = 0; i < Math.min(filtrados.length, limit); i++) {
                const option = document.createElement('option');
                option.value = filtrados[i];
                datalist.appendChild(option);
            }
        }

        function generarTabla() {
            let html = '<table>';
            html += '<tr><th><button id="menu-toggle" title="Alternar Encabezado">&#9776;</button></th>';
            dias.forEach(dia => html += `<th>${dia}</th>`);
            html += '</tr>';

            personas.forEach(persona => {
                html += '<tr>';
                html += `<td class="columna-nombre">${persona}</td>`;
                
                dias.forEach(dia => {
                    html += `<td><div class="celda-inputs" id="celda-${persona}-${dia.replace(/\s|\//g, '-')}">`;
                    
                    for (let i = 0; i < maxCamposPorCelda; i++) {
                        const idUnico = `${persona}-${dia}-${i}`.replace(/\s|\//g, '-');
                        const estiloDisplay = i === 0 ? 'flex' : 'none'; 
                        
                        // Añadida la opción NO ENTREGADO al Select Status
                        html += `
                        <div class="slot-wrapper" id="wrapper-${idUnico}" style="display: ${estiloDisplay};">
                            <div class="slot-header">
                                <select class="select-fase" id="fase-${idUnico}">
                                    <option value=""></option>
                                    <option value="RENDIMIENTO">RENDIMIENTO</option>
                                    <option value="VISUAL">VISUAL</option>
                                    <option value="PLANO">PLANO</option>
                                    <option value="MUESTRA">MUESTRA</option>
                                    <option value="PRODUCCIÓN">PRODUCCIÓN</option>
                                </select>
                                <select class="select-status" id="status-${idUnico}" style="display: none;">
                                    <option value=""></option>
                                    <option value="EN PROCESO">EN PROCESO</option>
                                    <option value="COMPROMISO">COMPROMISO</option>
                                    <option value="ENTREGADO">ENTREGADO</option>
                                    <option value="EN ESPERA">EN ESPERA</option>
                                    <option value="NO ENTREGADO">NO ENTREGADO</option>
                                </select>
                            </div>
                            <input type="text" id="${idUnico}" class="input-proyecto" list="lista-proyectos" placeholder="" autocomplete="off" style="display: none;">
                        </div>`;
                    }
                    
                    html += `</div></td>`;
                });
                
                html += '</tr>';
            });
            
            html += '</table>';
            tablaContenedor.innerHTML = html;
        }

        tablaContenedor.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'menu-toggle') {
                const header = document.getElementById('header-app');
                const btn = e.target;
                if (header.classList.contains('open')) {
                    header.classList.remove('open');
                    btn.innerHTML = '&#9776;';
                } else {
                    header.classList.add('open');
                    btn.innerHTML = '&#8593;';
                }
            }
        });

        // NUEVA LÓGICA DE COLORES DIRECTA (Sin retroactividad)
        function aplicarColorFondo(wrapperId, faseVal, statusVal) {
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return;

            const idBase = wrapperId.replace('wrapper-', '');
            const selectFase = document.getElementById(`fase-${idBase}`);
            const selectStatus = document.getElementById(`status-${idBase}`);
            const inputProy = document.getElementById(idBase);

            // Reseteo de colores de letra a default para que no queden blancos si cambian de estado
            selectFase.style.color = '#333';
            selectStatus.style.color = '#333';
            inputProy.style.color = '#000';

            // Evaluar Status para Fondos
            if (statusVal === 'NO ENTREGADO') {
                wrapper.style.backgroundColor = 'rgb(255, 0, 0)'; // Rojo absoluto
                // Letras a blanco en la celda
                selectFase.style.color = '#FFFFFF';
                selectStatus.style.color = '#FFFFFF';
                inputProy.style.color = '#FFFFFF';
            } else if (statusVal === 'EN PROCESO') {
                wrapper.style.backgroundColor = '#FFF59D'; // Amarillo claro
            } else if (statusVal === 'ENTREGADO') {
                if (faseVal === 'MUESTRA' || faseVal === 'PRODUCCIÓN') {
                    wrapper.style.backgroundColor = '#00FF00'; // Verde chillón absoluto
                } else {
                    wrapper.style.backgroundColor = '#d4edda'; // Verde pastel más limpio
                }
            } else {
                wrapper.style.backgroundColor = '#ffffff'; // Blanco
            }

            // Excepción del color del texto de Status en estados específicos (si no es NO ENTREGADO)
            if (statusVal !== 'NO ENTREGADO') {
                if (statusVal === 'EN ESPERA') {
                    selectStatus.style.color = '#F44336'; // Rojo
                } else if (statusVal === 'EN PROCESO') {
                    selectStatus.style.color = '#FF9800'; // Naranja
                }
            }
        }

        function actualizarVisibilidadInternaSlot(wrapperId) {
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return;
            
            const fase = wrapper.querySelector('.select-fase');
            const status = wrapper.querySelector('.select-status');
            const input = wrapper.querySelector('.input-proyecto');

            if (fase.value !== "") {
                status.style.display = 'block';
                if (status.value !== "") {
                    input.style.display = 'block';
                } else {
                    input.style.display = 'none';
                }
            } else {
                status.style.display = 'none';
                input.style.display = 'none';
            }
        }

        function actualizarVisibilidadCelda(celdaDiv) {
            const wrappers = Array.from(celdaDiv.querySelectorAll('.slot-wrapper'));
            let ultimoLleno = -1;

            wrappers.forEach((wrapper, index) => {
                const fase = wrapper.querySelector('.select-fase');
                const status = wrapper.querySelector('.select-status');
                const input = wrapper.querySelector('.input-proyecto');
                
                if (fase.value !== '' || status.value !== '' || input.value.trim() !== '') {
                    ultimoLleno = index;
                }
            });

            const mostrarHasta = ultimoLleno + 1;

            wrappers.forEach((wrapper, index) => {
                if (index <= mostrarHasta && index < maxCamposPorCelda) {
                    wrapper.style.display = 'flex';
                } else {
                    wrapper.style.display = 'none';
                }
            });
        }

        btnLogin.addEventListener('click', () => signInWithPopup(auth, provider).catch(error => console.error(error)));
        btnLogout.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.style.display = 'none';
                appContainer.style.display = 'flex';
                document.body.style.backgroundColor = '#f5f5f5';
                nombreUsuarioSpan.innerText = user.displayName;
                
                generarTabla();
                cargarProyectosDesdeJSON(); 
                iniciarSincronizacion();
            } else {
                loginContainer.style.display = 'flex';
                appContainer.style.display = 'none';
                document.body.style.backgroundColor = '#212121';
            }
        });

        function iniciarSincronizacion() {
            const todosLosInputs = document.querySelectorAll('.input-proyecto');
            const todasLasFases = document.querySelectorAll('.select-fase');
            const todosLosStatus = document.querySelectorAll('.select-status');
            const todasLasCeldas = document.querySelectorAll('.celda-inputs');

            function enviarAFirebase(idBase) {
                const textoVal = document.getElementById(idBase).value;
                const faseVal = document.getElementById(`fase-${idBase}`).value;
                const statusVal = document.getElementById(`status-${idBase}`).value;
                
                set(ref(db, `tableroProyectos/${idBase}`), {
                    texto: textoVal,
                    fase: faseVal,
                    status: statusVal
                });
            }

            // FUNCIÓN DE AUTOMATIZACIÓN NO ENTREGADO -> COMPROMISO
            function automatizarSiguienteDia(persona, diaActualStr, idOrigen) {
                // Buscamos en qué índice del arreglo general de 'dias' nos encontramos
                const indexDiaActual = dias.findIndex(d => d.replace(/\s|\//g, '-') === diaActualStr);
                
                // Si no se encuentra, o si es el último día (índice 4 = viernes), no hacemos nada
                if (indexDiaActual === -1 || indexDiaActual === dias.length - 1) return;

                const nextDiaStr = dias[indexDiaActual + 1].replace(/\s|\//g, '-');
                
                // Buscar siguiente celda disponible en la columna del día siguiente para esa persona
                let idDestino = null;
                for (let i = 0; i < maxCamposPorCelda; i++) {
                    const idTest = `${persona}-${nextDiaStr}-${i}`;
                    const elFase = document.getElementById(`fase-${idTest}`);
                    const elStatus = document.getElementById(`status-${idTest}`);
                    const elInput = document.getElementById(idTest);
                    
                    // Comprobamos que todos los campos del slot estén limpios/vacíos
                    if (elFase && elFase.value === "" && elStatus.value === "" && elInput.value.trim() === "") {
                        idDestino = idTest;
                        break;
                    }
                }

                if (idDestino) {
                    const faseOrigen = document.getElementById(`fase-${idOrigen}`).value;
                    const textoOrigen = document.getElementById(idOrigen).value;

                    // Asignamos la información en el slot del día siguiente
                    document.getElementById(`fase-${idDestino}`).value = faseOrigen;
                    document.getElementById(`status-${idDestino}`).value = "COMPROMISO";
                    document.getElementById(idDestino).value = textoOrigen;

                    // Enviamos inmediatamente a Firebase
                    enviarAFirebase(idDestino);
                    
                    // Actualizamos visualmente el tablero local en vivo
                    actualizarVisibilidadInternaSlot(`wrapper-${idDestino}`);
                    aplicarColorFondo(`wrapper-${idDestino}`, faseOrigen, "COMPROMISO");
                    
                    const celdaContenedora = document.getElementById(`celda-${persona}-${nextDiaStr}`);
                    if (celdaContenedora) {
                        actualizarVisibilidadCelda(celdaContenedora);
                    }
                }
            }

            todosLosInputs.forEach(input => {
                input.addEventListener('input', (e) => {
                    actualizarDatalist(e.target.value);
                    enviarAFirebase(e.target.id);
                    actualizarVisibilidadCelda(e.target.closest('.celda-inputs'));
                });

                input.addEventListener('focus', (e) => {
                    actualizarDatalist(e.target.value);
                });
            });

            todasLasFases.forEach(selectFase => {
                selectFase.addEventListener('change', (e) => {
                    const idBase = e.target.id.replace('fase-', '');
                    
                    actualizarVisibilidadInternaSlot(`wrapper-${idBase}`);
                    const statusVal = document.getElementById(`status-${idBase}`).value;
                    aplicarColorFondo(`wrapper-${idBase}`, e.target.value, statusVal);
                    actualizarVisibilidadCelda(e.target.closest('.celda-inputs'));
                    
                    enviarAFirebase(idBase);
                });
            });

            todosLosStatus.forEach(selectStatus => {
                selectStatus.addEventListener('change', (e) => {
                    const idBase = e.target.id.replace('status-', '');
                    const faseVal = document.getElementById(`fase-${idBase}`).value;
                    
                    actualizarVisibilidadInternaSlot(`wrapper-${idBase}`);
                    aplicarColorFondo(`wrapper-${idBase}`, faseVal, e.target.value);
                    actualizarVisibilidadCelda(e.target.closest('.celda-inputs'));
                    
                    enviarAFirebase(idBase);

                    // AL DISPARARSE EL CAMBIO, EVALUAMOS SI HAY QUE AUTOMATIZAR
                    if (e.target.value === 'NO ENTREGADO') {
                        // Extraemos quién es y qué día es basándonos en el ID único (Ej: GUILLE-lunes-18-05-1)
                        const personaMatch = personas.find(p => idBase.startsWith(p + '-'));
                        const lastDashIndex = idBase.lastIndexOf('-');
                        const diaIdStr = idBase.substring(personaMatch.length + 1, lastDashIndex);
                        
                        automatizarSiguienteDia(personaMatch, diaIdStr, idBase);
                    }
                });
            });

            onValue(tableroRef, (snapshot) => {
                const datosTablero = snapshot.val() || {};

                todosLosInputs.forEach(input => {
                    const idBase = input.id;
                    const dataServidor = datosTablero[idBase] || { texto: "", fase: "", status: "" };
                    
                    const selectFase = document.getElementById(`fase-${idBase}`);
                    const selectStatus = document.getElementById(`status-${idBase}`);

                    if (input.value !== dataServidor.texto && document.activeElement !== input) {
                        input.value = dataServidor.texto || "";
                    }
                    if (selectFase.value !== dataServidor.fase && document.activeElement !== selectFase) {
                        selectFase.value = dataServidor.fase || "";
                    }
                    if (selectStatus.value !== dataServidor.status && document.activeElement !== selectStatus) {
                        selectStatus.value = dataServidor.status || "";
                    }

                    actualizarVisibilidadInternaSlot(`wrapper-${idBase}`);
                    aplicarColorFondo(`wrapper-${idBase}`, dataServidor.fase || "", dataServidor.status || "");
                });

                todasLasCeldas.forEach(celda => {
                    actualizarVisibilidadCelda(celda);
                });
            });
        }
    </script>
</body>
</html>
