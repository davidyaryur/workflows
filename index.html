<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Construcción</title>
    <style>
        /* Estilos generales de la página */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Contenedor principal */
        .container {
            background-color: #ffffff;
            padding: 50px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        /* Icono de construcción */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        /* Título */
        h1 {
            color: #2c3e50;
            margin: 0 0 15px 0;
            font-size: 28px;
        }

        /* Texto descriptivo */
        p {
            color: #7f8c8d;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚧</div>
        <h1>Página en Construcción</h1>
        <p>...</p>
    </div>

</body>
</html>
